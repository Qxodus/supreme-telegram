  let urlList = []; // Array of {url, name}
  let filteredList = [];
  let selectedIndex = -1;

  // Parse the embedded data
  urlList = urlData.trim().split('\n').map(line => {
    const [url, name] = line.split('|').map(s => s.trim());
    return { url: url, name: name || url };
  });

  // Click anywhere on body to focus the search input
  document.body.addEventListener('click', (e) => {
    // Don't focus if clicking on dropdown items
    if (!e.target.closest('.dropdown-item')) {
      searchInput.focus();
    }
  });

  function filterList() {
    const query = searchInput.value.toLowerCase();
    filteredList = urlList.filter(item =>
      item.name.toLowerCase().includes(query) || item.url.toLowerCase().includes(query)
    );
    
    // Set selectedIndex to 0 (first result) by default when there are results
    selectedIndex = filteredList.length > 0 ? 0 : -1;
    
    renderDropdown();
  }

  function renderDropdown() {
    dropdown.innerHTML = '';
    if (filteredList.length === 0 || searchInput.value.trim() === '') {
      dropdown.style.display = 'none';
      return;
    }
    filteredList.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.textContent = item.name;
      div.addEventListener('mousedown', () => {
        selectItem(index);
      });
      if (index === selectedIndex) {
        div.classList.add('active');
      }
      dropdown.appendChild(div);
    });
    dropdown.style.display = 'block';
  }

  function selectItem(index) {
    if (index >= 0 && index < filteredList.length) {
      searchInput.value = filteredList[index].name;
      openURL(filteredList[index].url);
    }
  }

  function openURL(url) {
    window.open(url, '_blank');
    dropdown.style.display = 'none';
  }

  // Event listeners
  searchInput.addEventListener('input', filterList);

  searchInput.addEventListener('keydown', (e) => {
    if (dropdown.style.display === 'none') return;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (selectedIndex < filteredList.length - 1) {
        selectedIndex++;
        renderDropdown();
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (selectedIndex > 0) {
        selectedIndex--;
        renderDropdown();
      }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedIndex >= 0 && selectedIndex < filteredList.length) {
        selectItem(selectedIndex);
      } else if (filteredList.length === 1) {
        selectItem(0);
      } else if (filteredList.length > 0) {
        selectItem(0);
      }
    }
  });

  // Click outside to close dropdown
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-container')) {
      dropdown.style.display = 'none';
    }
  });
</script>
